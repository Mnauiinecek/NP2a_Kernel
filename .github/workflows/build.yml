name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/arter97/android_kernel_nothing_sm8475.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: 'master'
      kernel_defconfig:
        description: 'Defconfig (relative to root)'
        required: false
        type: string
        default: 'defconfig'
      extra_configs:
        description: 'Extra config fragments to merge (space-separated, relative to /)'
        required: false
        type: string
        default: ''

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/arter97/android_kernel_nothing_sm8475.git'
      kernel_branch:
        required: false
        type: string
        default: 'master'
      kernel_defconfig:
        required: false
        type: string
        default: 'defconfig'
      extra_configs:
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MAKE_ARGS: >-
        ARCH=arm64
        CROSS_COMPILE=aarch64-linux-gnu-
        CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        LLVM=1 LLVM_IAS=1
        LD=ld.lld HOSTLD=ld.lld
        CC=clang CXX=clang++
        HOSTCC=clang HOSTCXX=clang++
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: WKSU-SUSFS
            susfs: true
          - variant: WKSU
            susfs: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            lz4 cpio fakeroot python3 clang llvm lld gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi

      - name: Clone sources
        run: |
          # Kernel
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'master' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/arter97/android_kernel_nothing_sm8475.git' }}" \
            kernel

          # SUSFS (only for SUSFS variant)
          if [ "${{ matrix.susfs }}" = "true" ]; then
            git clone --depth=1 -b gki-android13-5.10 \
              https://gitlab.com/simonpunk/susfs4ksu.git
          fi

      - name: Setup WKSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary

      - name: Apply SUSFS patches
        if: matrix.susfs
        run: |
          cd kernel

          # Copy SUSFS source files
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          # Apply kernel patch
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.10.patch

          # Safety net: force susfs.o into the build regardless of Kconfig resolution.
          # The Configure step uses scripts/config to guarantee CONFIG_KSU_SUSFS=y,
          # but obj-y avoids a silent empty-object link failure if it gets dropped.
          sed -i 's/obj-$(CONFIG_KSU_SUSFS) += susfs.o/obj-y += susfs.o/' fs/Makefile
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-y += susfs.o' >> fs/Makefile

      - name: Configure kernel
        run: |
          cd kernel
          DEFCONFIG="./${{ inputs.kernel_defconfig || 'defconfig' }}"

          if [ ! -f "$DEFCONFIG" ]; then
            echo "ERROR: Defconfig file not found: $DEFCONFIG"
            exit 1
          fi

          # arter97 build flow starts from a root .config copied from defconfig
          cp "$DEFCONFIG" .config

          # Merge extra config fragments into .config (if any)
          EXTRA="${{ inputs.extra_configs }}"
          if [ -n "$EXTRA" ]; then
            for frag in $EXTRA; do
              FRAG_PATH="./$frag"
              if [ -f "$FRAG_PATH" ]; then
                echo "Merging: $frag"
                cat "$FRAG_PATH" >> .config
              fi
            done
          fi

          # Seed KSU/SUSFS options into .config (scripts/config below is the real authority)
          echo "CONFIG_KSU=y" >> .config
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> .config
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> .config
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> .config
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> .config
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> .config
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> .config
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> .config
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> .config
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> .config
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> .config
          else
            echo "CONFIG_KSU_SUSFS=n" >> .config
          fi

          # Force-set configs via scripts/config so Kconfig cannot silently drop them
          KCFG="./scripts/config --file .config"
          $KCFG -e KSU
          if [ "${{ matrix.susfs }}" = "true" ]; then
            $KCFG -e KSU_SUSFS
            $KCFG -e KSU_SUSFS_SUS_PATH
            $KCFG -e KSU_SUSFS_SUS_MOUNT
            $KCFG -e KSU_SUSFS_SUS_KSTAT
            $KCFG -e KSU_SUSFS_SPOOF_UNAME
            $KCFG -e KSU_SUSFS_ENABLE_LOG
            $KCFG -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            $KCFG -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
            $KCFG -e KSU_SUSFS_OPEN_REDIRECT
            $KCFG -e KSU_SUSFS_SUS_MAP
          else
            $KCFG -d KSU_SUSFS
          fi

          # Resolve dependencies without dropping our forced configs
          make $MAKE_ARGS olddefconfig

          # Verify critical configs survived
          echo "--- Config verification ---"
          grep -E 'CONFIG_KSU=|CONFIG_KSU_SUSFS=' .config || true
          if [ "${{ matrix.susfs }}" = "true" ]; then
            if ! grep -q 'CONFIG_KSU_SUSFS=y' .config; then
              echo "ERROR: CONFIG_KSU_SUSFS=y missing from final .config!"
              exit 1
            fi
          fi
          # Fail-safe: these MUST match stock or vendor modules won't load
          if grep -q 'CONFIG_DEBUG_FS=y' .config; then
            echo "WARNING: CONFIG_DEBUG_FS=y survived — vendor/debugfs.config was overridden!"
          fi

          # Remove -dirty suffix
          [ -f scripts/setlocalversion ] && sed -i 's/-dirty//g' scripts/setlocalversion || true

      - name: Enable swap space
        run: |
          # Remove existing swap file first
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build kernel
        run: |
          cd kernel
          # Reduce parallel jobs to prevent memory exhaustion
          JOBS=$(( $(nproc) / 2 ))
          [ "$JOBS" -lt 1 ] && JOBS=1

          make -j$JOBS $MAKE_ARGS KCFLAGS="-Wno-error"

      - name: Build boot.img (arter97)
        run: |
          cd kernel

          if [ ! -f arch/arm64/boot/Image.gz ]; then
            echo "ERROR: kernel Image.gz not found — build failed"
            exit 1
          fi

          KERNELDIR="$PWD"
          RAMFS_SOURCE="$KERNELDIR/ramdisk"
          RAMFS_TMP="/tmp/arter97-pong-ramdisk-${{ matrix.variant }}"
          PARTITION_SIZE=134217728
          OS_VERSION="12.0.0"
          OS_PATCH_LEVEL="2023-08"

          if [ ! -d "$RAMFS_SOURCE" ]; then
            echo "ERROR: ramdisk directory not found at $RAMFS_SOURCE"
            exit 1
          fi

          echo "Building new ramdisk from $RAMFS_SOURCE"
          rm -rf "$RAMFS_TMP" "$RAMFS_TMP.cpio" "$RAMFS_TMP.cpio.lz4"
          cp -axpP "$RAMFS_SOURCE" "$RAMFS_TMP"

          cd "$RAMFS_TMP"
          find . -name .git -exec rm -rf {} \;
          find . -name EMPTY_DIRECTORY -exec rm -rf {} \;

          if [ -x "$KERNELDIR/ramdisk_fix_permissions.sh" ]; then
            "$KERNELDIR/ramdisk_fix_permissions.sh" 2>/dev/null || true
          fi

          find . | fakeroot cpio -H newc -o | lz4 -l > "$RAMFS_TMP.cpio.lz4"

          cd "$KERNELDIR"
          curl -fsSL -o mkbootimg.py \
            https://raw.githubusercontent.com/LineageOS/android_system_tools_mkbootimg/lineage-20.0/mkbootimg.py

          echo "Making new boot image"
          python3 mkbootimg.py \
            --kernel "$KERNELDIR/arch/arm64/boot/Image.gz" \
            --ramdisk "$RAMFS_TMP.cpio.lz4" \
            --pagesize 4096 \
            --os_version "$OS_VERSION" \
            --os_patch_level "$OS_PATCH_LEVEL" \
            --header_version 4 \
            -o "$KERNELDIR/boot.img"

          GENERATED_SIZE=$(stat -c %s "$KERNELDIR/boot.img")
          if [ "$GENERATED_SIZE" -gt "$PARTITION_SIZE" ]; then
            echo "ERROR: boot.img size ($GENERATED_SIZE) larger than partition size ($PARTITION_SIZE)"
            exit 1
          fi

          VERSION_TAG="unknown"
          [ -f "$KERNELDIR/version" ] && VERSION_TAG="$(tr -d '\n' < "$KERNELDIR/version")"
          ARTIFACT_NAME="arter97-kernel-${VERSION_TAG}-${{ matrix.variant }}-boot.img"
          cp "$KERNELDIR/boot.img" "$GITHUB_WORKSPACE/$ARTIFACT_NAME"

          ls -lh "$GITHUB_WORKSPACE/$ARTIFACT_NAME"

          rm -f "$KERNELDIR/mkbootimg.py"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-NP2-${{ matrix.variant }}
          path: "*.img"
          retention-days: 30

      - name: Upload .config for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-NP2-${{ matrix.variant }}
          path: kernel/.config
          retention-days: 1

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP2-${{ matrix.variant }}
          path: rej/